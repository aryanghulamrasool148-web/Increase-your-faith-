<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Increase Your Faith — Scripture, Quiz &amp; Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Literata:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root, body[data-theme="dark"]{
    --bg: #0d0e14; --bg2: #171a26; --panel: #1c2032;
    --parchment: #f2ecdd; --parchment-dim: #cfc7ac;
    --gold: #d4a73d; --gold-soft: rgba(212,167,61,0.35);
    --ink: #2a2418; --offwhite: #f2ecdd; --muted: #9490a3;
    --correct: #6fae7c; --correct-glow: rgba(111,174,124,0.25);
    --wrong: #c85f5f; --wrong-glow: rgba(200,95,95,0.25);
    --paper: #ede3c8; --paper-dim: #ddd0a8;
    --starcolor: rgba(255,255,255,0.8);
  }
  body[data-theme="light"]{
    --bg: #faf6ea; --bg2: #f1e8d0; --panel: #fffdf6;
    --parchment: #2a2418; --parchment-dim: #4a4128;
    --gold: #9c6f1e; --gold-soft: rgba(156,111,30,0.28);
    --ink: #2a2418; --offwhite: #2a2418; --muted: #6b6047;
    --correct: #3f7a4d; --correct-glow: rgba(63,122,77,0.2);
    --wrong: #a13d3d; --wrong-glow: rgba(161,61,61,0.18);
    --paper: #fffaf0; --paper-dim: #f3e8cd;
    --starcolor: rgba(156,111,30,0.5);
  }
  /* 10-color highlighter palette */
  .hl-yellow{ --hlc: 255,224,89; } .hl-green{ --hlc: 120,224,120; } .hl-pink{ --hlc: 255,140,190; }
  .hl-blue{ --hlc: 110,180,255; } .hl-orange{ --hlc: 255,158,66; } .hl-purple{ --hlc: 190,130,255; }
  .hl-red{ --hlc: 255,99,99; } .hl-teal{ --hlc: 80,220,200; } .hl-gold{ --hlc: 224,180,60; } .hl-gray{ --hlc: 190,190,200; }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    min-height: 100vh;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(212,167,61,0.09), transparent 60%),
      radial-gradient(ellipse 80% 60% at 80% 100%, rgba(212,167,61,0.05), transparent 60%),
      var(--bg);
    color: var(--offwhite);
    font-family: 'Literata', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }
  .shell{ max-width: 860px; margin: 0 auto; padding: 20px 18px 70px; }
  .shell.rtl{ direction: rtl; }
  .rtl, .rtl *{ font-family: 'Noto Nastaliq Urdu', 'Literata', serif !important; }
  .rtl .qtag, .rtl .timernum, .rtl .vref, .rtl .answer-ref, .rtl .statbar, .rtl .vnum{ font-family: 'JetBrains Mono', monospace !important; }

  .settingsrow{ display:flex; justify-content:flex-end; gap:8px; margin-bottom: 14px; flex-wrap:wrap; }
  .rtl .settingsrow{ justify-content:flex-start; }
  .pillgroup{ display:flex; gap:2px; background: rgba(255,255,255,0.03); border:1px solid rgba(212,167,61,0.22); border-radius:999px; padding:3px; }
  .langtoggle, .themetoggle{ display:flex; gap:2px; }
  .langbtn{ padding: 6px 14px; border-radius: 999px; border: none;
    background: transparent; color: var(--muted); font-size: 0.76rem; font-family:'JetBrains Mono',monospace; }
  .langbtn.active{ background: linear-gradient(180deg, var(--gold), #b6872b); color:#1a1200; font-weight:600; }
  .langbtn:hover:not(.active){ color: var(--parchment); }

  .brand{ text-align:center; margin: 6px 0 14px; }
  .brand h1{
    font-family:'Cormorant Garamond', serif; font-weight:700;
    font-size: clamp(2.2rem, 8vw, 3rem); letter-spacing: 0.09em; margin: 0;
    color: var(--parchment); text-shadow: 0 0 24px var(--gold-soft);
  }
  .rtl .brand h1{ font-family: 'Noto Nastaliq Urdu', serif !important; letter-spacing:0; }
  .brand p{ margin: 6px 0 0; color: var(--muted); font-size: 0.88rem; }
  .credit{
    display:inline-block; margin-top: 12px; padding: 6px 16px; border-radius: 999px;
    background: linear-gradient(180deg, var(--gold), #b6872b); color:#1a1200;
    font-family:'JetBrains Mono',monospace !important; font-size: 0.72rem; letter-spacing: 0.05em;
    font-weight:600; box-shadow: 0 4px 14px rgba(212,167,61,0.3);
  }

  .topnav{
    position: sticky; top:0; z-index: 20; display:flex; gap:6px; justify-content:center;
    flex-wrap:wrap; margin: 18px 0 28px; padding: 8px; background: rgba(18,20,28,0.88);
    backdrop-filter: blur(6px); border-radius: 14px; border: 1px solid rgba(212,167,61,0.14);
  }
  .navtab{
    padding: 9px 16px; border-radius: 10px; border: none; background: transparent;
    color: var(--muted); font-size: 0.86rem; font-weight:500; letter-spacing:0.02em;
  }
  .navtab.active{ background: linear-gradient(180deg, var(--gold), #b6872b); color:#1a1200; font-weight:600; }
  .navtab:hover:not(.active){ color: var(--parchment); }

  button{ font-family:inherit; cursor:pointer; }
  .btn-primary{
    display:block; width:100%; padding: 16px 20px; border:none; border-radius: 12px;
    background: linear-gradient(180deg, var(--gold), #b6872b); color: #1a1200;
    font-weight:600; font-size: 1.05rem; letter-spacing:0.02em;
    box-shadow: 0 8px 24px rgba(212,167,61,0.22);
  }
  .btn-primary:hover{ box-shadow: 0 10px 28px rgba(212,167,61,0.32); }
  .navtab:focus-visible, .btn-primary:focus-visible, .opt:focus-visible,
  select:focus-visible, .navbtn:focus-visible, .chip:focus-visible, .reader-verse:focus-visible, .langbtn:focus-visible{
    outline: 2px solid var(--gold); outline-offset: 2px;
  }

  .votd{
    background: linear-gradient(180deg, var(--panel), var(--bg2));
    border: 1px solid rgba(212,167,61,0.22); border-radius: 18px; padding: 26px 24px;
    margin-bottom: 26px; text-align:center;
  }
  .votd .eyebrow{ font-family:'JetBrains Mono',monospace !important; font-size:0.68rem; letter-spacing:0.16em;
    text-transform:uppercase; color: var(--gold); margin-bottom:12px; }
  .votd .vtext{ font-family:'Cormorant Garamond',serif; font-size:1.5rem; line-height:1.45; color: var(--parchment); margin:0 0 12px; }
  .rtl .votd .vtext{ font-family:'Noto Nastaliq Urdu',serif !important; font-size:1.4rem; line-height:2.1; }
  .votd .vref{ font-family:'JetBrains Mono',monospace !important; font-size:0.78rem; color: var(--muted); }

  .lead{ text-align:center; color: var(--muted); font-size:0.98rem; line-height:1.6; max-width: 560px; margin: 0 auto 26px; }
  .cardgrid{ display:grid; gap:12px; margin-bottom: 22px; }
  .mode-card{
    background: linear-gradient(180deg, var(--panel), var(--bg2));
    border: 1px solid rgba(212,167,61,0.18); border-radius: 14px; padding: 18px 20px;
    display:flex; align-items:center; gap:14px; width:100%; text-align:left; color:inherit;
  }
  .rtl .mode-card{ text-align:right; }
  .mode-card .glyph{ font-family:'Cormorant Garamond', serif; font-weight:700; font-size:1.7rem;
    color: var(--gold); width: 42px; text-align:center; flex-shrink:0; }
  .mode-card .txt h3{ margin:0 0 2px; font-family:'Cormorant Garamond',serif; font-size:1.25rem; color: var(--parchment); font-weight:600;}
  .rtl .mode-card .txt h3{ font-family:'Noto Nastaliq Urdu',serif !important; }
  .mode-card .txt p{ margin:0; font-size:0.84rem; color:var(--muted); line-height:1.4; }
  .mode-card:hover{ border-color: rgba(212,167,61,0.4); }

  .statbar{ display:flex; justify-content:center; align-items:center; gap: 22px; margin: 0 0 18px;
    font-family:'JetBrains Mono', monospace !important; font-size: 0.8rem; color: var(--muted); }
  .statbar b{ color: var(--parchment); font-size: 0.95rem; }

  .qcard{
    background: linear-gradient(180deg, var(--paper), var(--paper-dim));
    color: var(--ink); border-radius: 18px; padding: 30px 30px 26px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4); position: relative; overflow:hidden;
  }
  .qcard::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 140% 60% at 50% -10%, rgba(212,167,61,0.18), transparent 60%); }
  .timerwrap{ margin: -8px -8px 18px; }
  .timerbar-bg{ height:6px; border-radius:3px; background: rgba(42,36,24,0.12); overflow:hidden; }
  .timerbar{ height:100%; background: linear-gradient(90deg, var(--gold), #8a5a1c); transition: width 1s linear, background 0.3s ease; }
  .timernum{ font-family:'JetBrains Mono',monospace !important; font-size:0.72rem; color:#8a7238; text-align:right; margin-top:4px; }
  .rtl .timernum{ text-align:left; }
  .qtag{ font-family:'JetBrains Mono',monospace !important; font-size:0.7rem; letter-spacing:0.14em;
    text-transform:uppercase; color:#8a7238; margin-bottom: 12px; display:block; }
  .drop{ font-family:'Cormorant Garamond', serif; font-weight:700; color:#8a5a1c;
    float:left; font-size: 3.6rem; line-height: 0.78; margin: 4px 10px 0 0; }
  .rtl .drop{ float:right; margin: 4px 0 0 10px; font-family:'Noto Nastaliq Urdu',serif !important; }
  .verse-text{ font-size: 1.28rem; line-height:1.65; margin: 0 0 4px; }
  .rtl .verse-text{ font-size: 1.35rem; line-height:2.1; }
  .question-text{ font-family:'Cormorant Garamond', serif; font-weight:600; font-size:1.65rem;
    line-height:1.35; margin: 4px 0 20px; color:#241d10; }
  .rtl .question-text{ font-family:'Noto Nastaliq Urdu',serif !important; line-height:2; }
  .ref-tag{ text-align:right; font-family:'JetBrains Mono',monospace !important; font-size:0.8rem;
    color:#8a7238; letter-spacing:0.04em; margin-top: 8px; }
  .rtl .ref-tag{ text-align:left; }
  .options{ display:grid; gap:12px; margin-top: 20px; clear:both; }
  .opt{ text-align:left; padding: 15px 18px; border-radius:10px; border: 1.5px solid rgba(42,36,24,0.16);
    background: rgba(255,255,255,0.35); color: var(--ink); font-size: 1.04rem;
    transition: background 0.12s ease, border-color 0.12s ease; }
  .rtl .opt{ text-align:right; }
  .opt:hover:not(:disabled){ background: rgba(255,255,255,0.6); border-color: rgba(42,36,24,0.3); }
  .opt:disabled{ cursor:default; }
  .opt.correct{ background: var(--correct-glow); border-color: var(--correct); }
  .opt.wrong{ background: var(--wrong-glow); border-color: var(--wrong); }
  .feedback{ margin-top: 18px; padding: 13px 15px; border-radius: 10px; font-size:0.95rem;
    display:none; align-items:center; gap:8px; }
  .feedback.show{ display:flex; }
  .feedback.good{ background: var(--correct-glow); color:#284a30; }
  .feedback.bad{ background: var(--wrong-glow); color:#4a2222; }

  .loading{ text-align:center; color: var(--muted); padding: 60px 0; font-size:0.92rem;
    font-family:'JetBrains Mono',monospace !important; letter-spacing:0.04em; }
  .flame{ display:inline-block; animation: flick 1.6s ease-in-out infinite; }
  @keyframes flick{ 0%,100%{ opacity:1; transform: scale(1);} 50%{ opacity:0.6; transform: scale(0.92);} }
  @media (prefers-reduced-motion: reduce){ .flame{ animation:none; } .timerbar{ transition:none; } }

  .reader-controls{ display:flex; gap:10px; margin-top: 4px; flex-wrap:wrap; align-items:center; }
  select{ background: var(--panel); color: var(--offwhite); border:1px solid rgba(212,167,61,0.25);
    border-radius:8px; padding: 10px 12px; font-family:inherit; font-size:0.95rem; flex:1; min-width:150px; }
  .navrow{ display:flex; gap:8px; margin-top:10px; }
  .navbtn{ flex:1; padding: 11px; border-radius:8px; border:1px solid rgba(212,167,61,0.25);
    background: var(--panel); color: var(--parchment); font-size:0.86rem; }
  .navbtn:disabled{ opacity:0.35; cursor:default; }
  .navbtn:hover:not(:disabled){ border-color: var(--gold); }

  .reader-hint{ text-align:center; color: var(--muted); font-size:0.78rem; margin: 14px 0 4px; }

  .reader-card{
    background: linear-gradient(180deg, var(--paper), var(--paper-dim));
    color: var(--ink); border-radius: 18px; padding: 34px 36px; margin-top: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .reader-title{ font-family:'Cormorant Garamond', serif; font-weight:700; font-size:1.9rem;
    margin: 0 0 20px; color:#3a2f14; }
  .rtl .reader-title{ font-family:'Noto Nastaliq Urdu',serif !important; }
  .reader-verse{ font-size: 1.18rem; line-height:1.85; margin: 0 0 4px; padding: 6px 10px; border-radius: 8px;
    cursor: pointer; transition: background 0.15s ease; }
  .rtl .reader-verse{ font-size: 1.3rem; line-height: 2.3; }
  .reader-verse:hover{ background: rgba(138,90,28,0.08); }
  .reader-verse.highlighted{ background: rgba(var(--hlc), 0.55); position:relative; }
  .reader-verse.highlighted.neon{ background: rgba(var(--hlc), 0.4); box-shadow: 0 0 14px 2px rgba(var(--hlc), 0.9), inset 0 0 8px rgba(var(--hlc), 0.5); }
  .reader-verse.sweep{ animation: hlReveal 0.42s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes hlReveal{ 0%{ background-color: transparent; transform: scale(1); box-shadow:none; }
    45%{ transform: scale(1.02); } 100%{ transform: scale(1); } }
  @media (prefers-reduced-motion: reduce){ .reader-verse.sweep{ animation:none; } }
  .reader-verse .shareicon{ display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; margin-left:8px;
    border-radius:50%; background: rgba(42,36,24,0.12); color:#5a4a20; font-size:0.72rem; vertical-align:middle; cursor:pointer; }
  .reader-verse .shareicon:hover{ background: rgba(42,36,24,0.22); }
  .reader-verse .vnum{ font-family:'JetBrains Mono',monospace !important; font-size:0.72rem; color:#8a5a1c; font-weight:600;
    vertical-align: super; margin-right: 5px; }
  .rtl .reader-verse .vnum{ margin-right:0; margin-left:5px; }

  .askbox{ display:flex; gap:10px; margin-bottom: 14px; }
  .askbox input{
    flex:1; padding: 14px 16px; border-radius: 12px; border:1px solid rgba(212,167,61,0.25);
    background: var(--panel); color: var(--offwhite); font-family:inherit; font-size: 1rem;
  }
  .askbox input::placeholder{ color: var(--muted); }
  .askbox button{ padding: 0 22px; border:none; border-radius: 12px;
    background: linear-gradient(180deg, var(--gold), #b6872b); color:#1a1200; font-weight:600; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 22px; }
  .chip{ padding: 7px 14px; border-radius: 999px; border:1px solid rgba(212,167,61,0.3);
    background: transparent; color: var(--muted); font-size:0.82rem; }
  .chip:hover{ color: var(--parchment); border-color: var(--gold); }
  .answer-card{
    background: linear-gradient(180deg, var(--paper), var(--paper-dim));
    color: var(--ink); border-radius: 18px; padding: 30px 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .answer-q{ font-family:'JetBrains Mono',monospace !important; font-size:0.74rem; color:#8a7238; margin-bottom:14px;
    text-transform:uppercase; letter-spacing:0.08em; }
  .rtl .answer-q{ text-transform:none; }
  .answer-text{ font-family:'Cormorant Garamond',serif; font-size:1.5rem; line-height:1.5; margin:0 0 14px; color:#241d10; }
  .rtl .answer-text{ font-family:'Noto Nastaliq Urdu',serif !important; line-height:2.1; }
  .answer-ref{ font-family:'JetBrains Mono',monospace !important; font-size:0.85rem; color:#8a5a1c; text-align:right; }
  .rtl .answer-ref{ text-align:left; }
  .answer-alt{ margin-top:18px; padding-top:16px; border-top:1px dashed rgba(42,36,24,0.2); font-size:0.85rem; color:#6b5c3a; }

  .footer-note{ text-align:center; color: var(--muted); font-size:0.72rem; margin-top: 34px; line-height:1.7; }
  .footer-note a{ color: var(--gold); text-decoration:none; }

  /* Theme toggle */
  /* theme toggle styling now shares .langtoggle/.themetoggle rules defined above */

  /* HOLY homepage */
  .holywrap{ position:relative; border-radius:22px; overflow:hidden; padding: 40px 24px 30px; margin-bottom:24px;
    background: radial-gradient(ellipse 90% 70% at 50% 0%, rgba(212,167,61,0.16), transparent 65%), linear-gradient(180deg, var(--bg2), var(--bg));
    border:1px solid rgba(212,167,61,0.22); text-align:center; }
  .stars{ position:absolute; inset:0; pointer-events:none; opacity:0.7; }
  .star{ position:absolute; width:2px; height:2px; border-radius:50%; background: var(--starcolor); animation: twinkle 3.5s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{ opacity:0.15; transform:scale(1);} 50%{ opacity:1; transform:scale(1.6);} }
  .holy-symbol{ font-size:1.6rem; color: var(--gold); margin-bottom:10px; text-shadow: 0 0 18px var(--gold-soft); position:relative; z-index:1; }
  .holy-divider{ display:flex; align-items:center; gap:12px; justify-content:center; margin: 18px auto 0; max-width:220px; position:relative; z-index:1; }
  .holy-divider::before, .holy-divider::after{ content:""; flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--gold-soft)); }
  .holy-divider::after{ background: linear-gradient(90deg, var(--gold-soft), transparent); }
  .holy-divider span{ color: var(--gold); font-size:0.9rem; }

  /* Reader top bar with note FAB */
  .reader-topbar{ display:flex; justify-content:flex-end; margin-bottom:8px; position:relative; }
  .notefab{ display:flex; align-items:center; gap:8px; padding: 9px 16px; border-radius: 999px; border:1px solid rgba(212,167,61,0.35);
    background: linear-gradient(180deg, var(--panel), var(--bg2)); color: var(--parchment); font-size:0.85rem; font-weight:600;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25); }
  .notefab:hover{ border-color: var(--gold); }
  .notefab .pencap{ width:14px; height:14px; border-radius:3px; background: linear-gradient(145deg, rgba(var(--hlc),1), rgba(var(--hlc),0.6));
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.6), inset 0 -2px 3px rgba(0,0,0,0.25); }

  /* 3D highlighter popover */
  .hlpanel{ position:absolute; top: 46px; right:0; z-index:30; width: min(320px, 90vw); padding: 20px 18px 18px;
    border-radius: 18px; background: linear-gradient(180deg, var(--panel), var(--bg2)); border:1px solid rgba(212,167,61,0.3);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .rtl .hlpanel{ right:auto; left:0; }
  .hlpanel-title{ font-family:'Cormorant Garamond',serif; font-size:1.15rem; color: var(--parchment); margin:0 0 4px; }
  .rtl .hlpanel-title{ font-family:'Noto Nastaliq Urdu',serif !important; }
  .hlpanel-sub{ font-size:0.76rem; color: var(--muted); margin-bottom:14px; }

  /* Modal overlay version (triggered by tapping a verse) */
  .notemodal-overlay{ position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center; padding:20px; }
  .notemodal{ width:min(340px,92vw); max-height:88vh; overflow-y:auto; padding:22px 20px 20px;
    border-radius:20px; background: linear-gradient(180deg, var(--panel), var(--bg2)); border:1px solid rgba(212,167,61,0.35);
    box-shadow: 0 30px 70px rgba(0,0,0,0.6); }
  .notemodal-preview{ font-size:0.86rem; color: var(--muted); background: rgba(255,255,255,0.04); border-radius:10px;
    padding:10px 12px; margin-bottom:14px; line-height:1.5; max-height:90px; overflow-y:auto; }
  .notemodal-actions{ display:grid; gap:8px; margin-top:6px; }
  .notemodal-actions .removebtn{ padding:10px; border-radius:10px; border:1px solid rgba(200,95,95,0.4);
    background:transparent; color:#d98888; font-size:0.85rem; }
  .notemodal-actions .removebtn:hover{ background: rgba(200,95,95,0.12); }

  /* the literal 3D highlighter pen */
  .pen3d{ display:flex; justify-content:center; margin: 6px 0 18px; perspective: 400px; }
  .pen3d .body{ width: 46px; height: 130px; position:relative; transform: rotateX(8deg) rotateY(-6deg); transform-style: preserve-3d;
    transition: background 0.25s ease; }
  .pen3d .barrel{ position:absolute; top:26px; left:0; width:100%; height:82px; border-radius: 8px;
    background: linear-gradient(90deg, rgba(255,255,255,0.35) 0%, rgba(var(--pen,212,167,61),1) 18%, rgba(var(--pen,212,167,61),0.85) 55%, rgba(0,0,0,0.25) 100%);
    box-shadow: 0 10px 22px rgba(0,0,0,0.45), inset 0 2px 2px rgba(255,255,255,0.5); }
  .pen3d .barrel::after{ content:""; position:absolute; top:8px; bottom:8px; left:8px; width:6px; border-radius:4px; background: rgba(255,255,255,0.55); filter: blur(1px); }
  .pen3d .cap{ position:absolute; top:0; left:6px; width: 34px; height: 34px; border-radius: 6px 6px 3px 3px;
    background: linear-gradient(160deg, rgba(var(--pen,212,167,61),1), rgba(var(--pen,212,167,61),0.6));
    box-shadow: 0 6px 14px rgba(0,0,0,0.35), inset 0 2px 2px rgba(255,255,255,0.5); }
  .pen3d .tip{ position:absolute; bottom:-14px; left:14px; width:0; height:0;

  .hlcolors{ display:grid; grid-template-columns: repeat(5,1fr); gap:10px; margin-bottom: 16px; }

  .saint-detail-head .stag{ font-family:'JetBrains Mono',monospace !important; font-size:0.72rem; color: var(--gold); white-space:nowrap; margin-top:6px; }

  .saint-dot{ width:8px; height:8px; border-radius:50%; background: rgba(212,167,61,0.25); border:none; padding:0; }
  .saint-dot.active{ background: var(--gold); }
  .saint-page{ background: linear-gradient(180deg, var(--paper), var(--paper-dim)); color: var(--ink); border-radius:16px;

    { name:"Paul the Apostle", nameUr:"پولس رسول", tag:"c. 5–67 AD", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",

        ur:"انتونی صحرا میں مزید اندر جاتا رہا، قبروں اور ایک ویران قلعے میں رہا، اور شدید اندرونی آزمائشوں کا مقابلہ کیا۔ ایک بار وہ تقریباً بے جان حالت میں پایا گیا، پھر بھی وہ مزید تنہائی کی طرف بڑھا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Anthony taught that constant watchfulness over one's thoughts and total reliance on God could overcome any temptation. His example drew so many followers into the desert that organized Christian monasticism began around his community. Athanasius of Alexandria's biography of his life became one of the most widely read Christian texts of late antiquity.",
        ur:"انتونی نے سکھایا کہ مسلسل ہوشیاری اور خدا پر بھروسہ کسی بھی آزمائش پر غالب آ سکتا ہے۔ اس کی مثال نے اتنے لوگوں کو صحرا کی طرف کھینچا کہ منظم راہبانہ نظام اسی سے شروع ہوا۔" }
    ]},
    { name:"Monica of Hippo", nameUr:"مونیکا", tag:"c. 331–387", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in North Africa around 331 to a Christian family, Monica was given in marriage to Patricius, a pagan man with a difficult temper. She raised her children, including her son Augustine, in the Christian faith despite her husband's initial opposition, eventually seeing him baptized shortly before his death.",
        ur:"مونیکا 331 کے قریب شمالی افریقہ میں ایک مسیحی گھرانے میں پیدا ہوئی اور پیٹریشیئس نامی ایک مشکل مزاج غیر مسیحی شخص سے بیاہی گئی۔ اس نے اپنے بچوں، بشمول آگسٹین، کو مسیحی ایمان میں پالا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Monica spent years grieving over Augustine's wayward youth, his years following a philosophy she considered false teaching, and his refusal to be baptized. She wept so persistently that a bishop reportedly told her, ‘the child of these tears shall never perish.’ She followed Augustine to Italy, continuing to pray even when it seemed hopeless.",
        ur:"مونیکا نے آگسٹین کی گمراہ جوانی اور بپتسمہ سے انکار پر برسوں آنسو بہائے۔ ایک بشپ نے مبینہ طور پر اس سے کہا: ‘اتنے آنسوؤں کا بیٹا ہلاک نہیں ہو سکتا۔’ وہ آگسٹین کے پیچھے اٹلی تک گئی، جب امید بھی معدوم لگتی تھی۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Monica did not write theology, but her life became a model of persistent intercessory prayer for a wayward child. She lived to see Augustine's conversion and baptism, dying shortly after in Ostia, Italy, on the journey home. Her patient, unglamorous faith remains an encouragement to parents who pray for children who have wandered.",
        ur:"مونیکا نے کوئی الہیات نہیں لکھی، لیکن اس کی زندگی گمراہ بچے کے لیے مسلسل دعا کی مثال بن گئی۔ اس نے آگسٹین کی تبدیلی دیکھی اور واپسی کے سفر پر اٹلی کے شہر اوستیا میں وفات پائی۔" }
    ]},
    { name:"Augustine of Hippo", nameUr:"آگسٹین", tag:"354–430", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in North Africa in 354 to Monica and Patricius, Augustine received an excellent education and moved to Carthage, then Rome and Milan, pursuing a career teaching rhetoric. Along the way he lived with a partner outside marriage, fathered a son, and explored philosophies his mother considered dangerous, all while feeling increasingly restless.",
        ur:"آگسٹین 354 میں شمالی افریقہ میں مونیکا اور پیٹریشیئس کے ہاں پیدا ہوا۔ اس نے بہترین تعلیم پائی اور کارتھیج، پھر روم اور میلان میں فن تقریر پڑھانے کا پیشہ اپنایا، جبکہ ایک ساتھی کے ساتھ بغیر شادی کے رہا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Augustine described years of internal conflict between his ambitions and pleasures and a growing pull toward Christian faith, famously praying ‘give me chastity, but not yet.’ A turning point came in a Milan garden, where he heard a child's voice repeating ‘take up and read,’ prompting him to open Scripture to a passage that finally broke his resistance.",
        ur:"آگسٹین نے اپنی خواہشات اور بڑھتے ہوئے مسیحی رجحان کے درمیان برسوں کی اندرونی کشمکش بیان کی، اور مشہور دعا کی: ‘مجھے پاکیزگی دے، مگر ابھی نہیں۔’ میلان کے ایک باغ میں ایک بچے کی آواز سن کر اس نے بائبل کھولی اور تبدیل ہو گیا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Augustine became Bishop of Hippo and one of Christianity's most influential theologians, writing Confessions, a searingly honest account of his own sin and conversion, and The City of God. His teaching on grace, original sin, and the nature of the Church shaped both Catholic and later Protestant theology for over a thousand years.",
        ur:"آگسٹین ہپو کا بشپ بنا اور مسیحیت کے سب سے بااثر ماہرین الہیات میں سے ایک بن گیا۔ اس نے ‘اعترافات’ لکھی، اپنے گناہ اور تبدیلی کا دیانتدارانہ بیان۔ فضل پر اس کی تعلیمات نے صدیوں تک الہیات کو تشکیل دیا۔" }
    ]},
    { name:"Jerome", nameUr:"جیروم", tag:"c. 347–420", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born around 347 in the region of modern Croatia, Jerome received a classical Roman education in rhetoric and literature before being baptized as a young man in Rome. He traveled extensively, eventually pursuing ascetic life and dedicating himself to serious study of Scripture.",
        ur:"جیروم تقریباً 347 میں موجودہ کروشیا کے علاقے میں پیدا ہوا اور روم میں کلاسیکی تعلیم حاصل کی، اور وہیں جوانی میں بپتسمہ لیا۔ اس نے بہت سفر کیا اور آخرکار زاہدانہ زندگی اور بائبل کے مطالعے کو اپنایا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"While living as a hermit in the Syrian desert near Antioch, Jerome described being tormented by memories of the pleasures of Rome even as he tried to master Hebrew as a discipline of self-denial. He was famously quick-tempered, and his often harsh, sarcastic writings against theological opponents earned him lasting enemies.",
        ur:"انطاکیہ کے قریب شامی صحرا میں رہتے ہوئے، جیروم روم کی یادوں سے پریشان رہا جبکہ عبرانی زبان سیکھنے کی مشقت کرتا رہا۔ وہ تیز مزاج کے لیے مشہور تھا، اور اپنے مخالفین کے خلاف تلخ تحریروں کی وجہ سے اس کے دشمن بھی بہت بنے۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Settling in Bethlehem, Jerome spent decades translating the Bible from Hebrew and Greek into Latin, producing the Vulgate, which became the standard biblical text of the Western Church for over a thousand years. His scholarship, despite his difficult personality, gave the medieval Church direct access to Scripture.",
        ur:"بیت لحم میں رہتے ہوئے، جیروم نے دہائیوں تک بائبل کا عبرانی اور یونانی سے لاطینی میں ترجمہ کیا، جسے ‘ولگیٹ’ کہا جاتا ہے، جو ہزار سال سے زیادہ مغربی کلیسیا کی معیاری بائبل رہی۔" }
    ]},
    { name:"Benedict of Nursia", nameUr:"بینیڈکٹ", tag:"c. 480–547", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born around 480 in Nursia, Italy, Benedict was sent to study in Rome but was troubled by the immorality he witnessed among fellow students. He abandoned his studies and withdrew to live as a hermit in a cave at Subiaco, relying on a monk named Romanus to secretly bring him food.",
        ur:"بینیڈکٹ 480 کے قریب نرسیا، اٹلی میں پیدا ہوا۔ روم میں تعلیم کے دوران ساتھی طلبہ کی بداخلاقی دیکھ کر وہ پریشان ہوا اور سبیاکو کی ایک غار میں تارک الدنیا زندگی اختیار کی۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"As word of his holiness spread, a nearby monastery asked him to become their abbot, but the monks, resentful of his strict discipline, allegedly attempted to poison his wine; tradition holds the cup shattered when he blessed it. A jealous local priest's rivalry later forced him to relocate to Monte Cassino.",
        ur:"جب اس کی نیکی کی شہرت پھیلی تو ایک قریبی خانقاہ نے اسے اپنا سربراہ بنایا، مگر سخت نظم و ضبط سے ناراض راہبوں نے مبینہ طور پر اسے زہر دینے کی کوشش کی۔ ایک حاسد پادری کی مخالفت نے اسے مونٹے کاسینو منتقل ہونے پر مجبور کیا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"At Monte Cassino, Benedict wrote the Rule of Saint Benedict, a balanced guide to community life built on prayer, manual work, and obedience, summarized in ‘ora et labora’ — pray and work. The Rule became the foundation of Western monasticism, preserving learning and stability through the disorder that followed Rome's collapse.",
        ur:"مونٹے کاسینو میں بینیڈکٹ نے ‘قاعدہ بینیڈکٹ’ لکھا، جو دعا، محنت اور اطاعت پر مبنی متوازن اجتماعی زندگی کا رہنما ہے۔ یہ قاعدہ مغربی راہبانہ نظام کی بنیاد بنا۔" }
    ]},
    { name:"Patrick of Ireland", nameUr:"پیٹرک", tag:"c. 385–461", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born around 385 in Roman Britain to a Christian family, Patrick was not particularly devout as a boy. At sixteen he was captured by Irish raiders and enslaved for six years as a shepherd, during which time isolation and hardship deepened his faith into a personal, constant practice of prayer.",
        ur:"پیٹرک تقریباً 385 میں رومی برطانیہ میں ایک مسیحی گھرانے میں پیدا ہوا۔ سولہ سال کی عمر میں آئرش قزاقوں نے اسے اغوا کر کے چھ سال تک غلام چرواہے کے طور پر رکھا، جس دوران تنہائی نے اس کے ایمان کو گہرا کیا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"After hearing a voice in a dream telling him a ship was ready to take him home, Patrick escaped and walked roughly two hundred miles to the coast. Years later, another vision calling him back to Ireland led him to return, this time to the very people who had enslaved him, facing hostility from local kings and druid priests.",
        ur:"ایک خواب میں آواز سن کر کہ جہاز تیار ہے، پیٹرک فرار ہوا اور تقریباً دو سو میل پیدل چل کر ساحل پہنچا۔ برسوں بعد ایک اور رویا نے اسے آئرلینڈ واپس بلایا، جہاں مقامی بادشاہوں اور جادوگر پجاریوں کی مخالفت کا سامنا کرنا پڑا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Patrick spent decades establishing churches and training clergy across Ireland, using local symbols like the shamrock, tradition holds, to explain the Trinity. His Confession, a humble first-person account of his life and calling, is one of the earliest surviving documents from the British Isles.",
        ur:"پیٹرک نے دہائیوں تک آئرلینڈ بھر میں کلیسیائیں قائم کیں۔ روایت کے مطابق اس نے سہ شاخہ پتی کے ذریعے تثلیث سمجھائی۔ اس کا ‘اعتراف’ برطانوی جزائر کی قدیم ترین تحریروں میں سے ایک ہے۔" }
    ]},
    { name:"Nicholas of Myra", nameUr:"نکولس", tag:"c. 270–343", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born around 270 in Patara, in modern Turkey, to wealthy Christian parents who died while he was young, Nicholas inherited considerable wealth. Rather than keeping it, he began quietly using it to help those in need, eventually becoming bishop of the nearby city of Myra.",
        ur:"نکولس تقریباً 270 میں پاتارا، موجودہ ترکی میں امیر مسیحی والدین کے ہاں پیدا ہوا جو اس کی جوانی میں ہی وفات پا گئے۔ دولت رکھنے کے بجائے اس نے اسے ضرورت مندوں کی مدد کے لیے استعمال کیا اور بعد میں مائرا کا بشپ بنا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"During the persecution of Christians under Emperor Diocletian, tradition holds Nicholas was imprisoned for his faith before later being released when Christianity gained toleration under Constantine. Later legend also places him at the Council of Nicaea in 325, defending core Christian teaching against the Arian heresy.",
        ur:"ڈیوکلیشین کے دور کے ظلم و ستم میں روایت کے مطابق نکولس کو ایمان کی وجہ سے قید کیا گیا، بعد میں رہا ہوا۔ روایت اسے 325 میں کونسل آف نائسیا میں بھی رکھتی ہے۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Nicholas became famous for secretly providing dowries for three impoverished sisters so they would not be forced into destitution, tossing gold through their window at night, a story widely credited as the origin of the Santa Claus tradition. He remains a model of hidden, sacrificial generosity toward the vulnerable.",
        ur:"نکولس تین غریب بہنوں کو خفیہ طور پر جہیز دینے کے لیے مشہور ہوا، رات کو ان کی کھڑکی سے سونا پھینک کر — یہ کہانی سانتا کلاز کی روایت کی بنیاد سمجھی جاتی ہے۔" }
    ]},
    { name:"Francis of Assisi", nameUr:"فرانسس اسیزی", tag:"1181/82–1226", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1181 or 1182 to a wealthy cloth merchant in Assisi, Italy, Francis enjoyed a carefree youth of parties and ambitions of knighthood. Captured and imprisoned for a year during a local war, and later gravely ill, he emerged from these experiences searching for deeper meaning.",
        ur:"فرانسس 1181 یا 1182 میں اسیزی کے ایک امیر تاجر کے گھر پیدا ہوا اور جوانی میں عیش و عشرت کی زندگی گزارتا تھا۔ ایک جنگ میں ایک سال قید رہنے اور شدید بیمار ہونے کے بعد وہ گہرے مقصد کی تلاش میں نکلا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Encounters with lepers and a moment of prayer before a crucifix in a ruined chapel, where he felt called to ‘rebuild my church,’ marked Francis's turning point. His father, furious at Francis giving away merchandise and money to the poor, publicly disowned him, and Francis responded by stripping off his clothes in the town square and walking away naked into a life of poverty.",
        ur:"کوڑھیوں سے ملاقاتوں اور ایک ویران چیپل میں صلیب کے سامنے دعا کے دوران فرانسس کو ‘میری کلیسیا کو دوبارہ تعمیر کرو’ کی پکار محسوس ہوئی۔ اس کے والد نے غصے میں اسے عاق کر دیا، جس پر فرانسس نے چوک میں اپنے کپڑے اتار کر مکمل غربت کی زندگی اپنائی۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Francis founded the Franciscan order on radical poverty, service to the poor, and love for creation, famously preaching even to birds. Near the end of his life, tradition holds he received the stigmata, wounds resembling those of Christ's crucifixion. He remains one of the most universally admired figures across Christian traditions and beyond.",
        ur:"فرانسس نے فرانسسکن آرڈر کی بنیاد رکھی جو غربت، غریبوں کی خدمت اور مخلوقات سے محبت پر مبنی تھی۔ روایت کے مطابق اس کی زندگی کے آخر میں اسے مسیح کے زخموں جیسے نشانات ملے۔" }
    ]},
    { name:"Clare of Assisi", nameUr:"کلیئر اسیزی", tag:"1194–1253", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1194 to a noble family in Assisi, Clare was deeply moved by Francis's preaching as a teenager. Against her family's wishes for an advantageous marriage, she secretly left home at night at age eighteen to join Francis's movement, cutting off her hair as a symbol of her new life.",
        ur:"کلیئر 1194 میں اسیزی کے ایک شریف گھرانے میں پیدا ہوئی۔ نوجوانی میں فرانسس کی تبلیغ سے متاثر ہو کر، اٹھارہ سال کی عمر میں رات کو خفیہ طور پر گھر چھوڑ کر فرانسس کی تحریک میں شامل ہوئی۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Clare's relatives attempted to physically drag her from the convent to force her return home, but she clung to the altar and resisted. She went on to found the Poor Clares, insisting on total poverty even when Church authorities pressured her community to accept property and secure income.",
        ur:"اس کے رشتہ داروں نے اسے زبردستی واپس لے جانے کی کوشش کی، مگر وہ قربان گاہ سے چمٹی رہی۔ اس نے ‘غریب کلیئرز’ کی بنیاد رکھی اور کلیسیائی حکام کے دباؤ کے باوجود مکمل غربت پر اصرار کیا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Clare led her community for forty years, often directing it from her sickbed during her later years of illness, finally securing papal approval for her way of life just before her death. Her insistence on radical poverty gave women a distinctive and influential place within the wider Franciscan movement.",
        ur:"کلیئر نے چالیس سال تک اپنی جماعت کی قیادت کی، وفات سے پہلے پاپائی منظوری حاصل کر لی۔ غربت پر اس کا اصرار فرانسسکن تحریک میں خواتین کو ایک منفرد مقام دیتا ہے۔" }
    ]},
    { name:"Thomas Aquinas", nameUr:"تھامس اکوئنی", tag:"1225–1274", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born around 1225 to an aristocratic Italian family, Thomas was expected to pursue a prestigious position within the Church hierarchy. Instead, as a teenager he chose to join the Dominicans, a newer order committed to poverty and preaching, a decision his family found deeply humiliating.",
        ur:"تھامس تقریباً 1225 میں اطالوی اشرافیہ کے گھرانے میں پیدا ہوا۔ خاندان اسے کلیسیا میں بڑا عہدہ دلانا چاہتا تھا، مگر نوجوانی میں اس نے ڈومینیکن آرڈر میں شمولیت اختیار کی، جو خاندان کے لیے شرمندگی کا باعث بنی۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Thomas's brothers, acting on his family's orders, kidnapped him and held him under house arrest for nearly a year, reportedly even sending a woman to tempt him from his vow of celibacy; Thomas drove her away and remained firm. Eventually his family relented, and he was allowed to enter religious life.",
        ur:"اس کے بھائیوں نے خاندان کے حکم پر اسے اغوا کر کے تقریباً ایک سال گھر میں نظر بند رکھا، اور روایت کے مطابق اسے بہکانے کے لیے ایک عورت بھی بھیجی، جسے تھامس نے بھگا دیا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Thomas became the towering theologian of the Middle Ages, writing the Summa Theologica, a vast synthesis of Christian doctrine and Aristotelian philosophy still studied today. Near the end of his life he experienced a profound mystical encounter during Mass, after which he stopped writing entirely, saying all he had written seemed like straw compared to what he had seen.",
        ur:"تھامس قرون وسطیٰ کا سب سے بڑا ماہر الہیات بنا اور ‘سمّا تھیالوجیکا’ لکھی۔ زندگی کے آخر میں ایک گہرے روحانی تجربے کے بعد اس نے لکھنا مکمل چھوڑ دیا، کہا کہ جو کچھ اس نے لکھا وہ بھوسے کی مانند تھا۔" }
    ]},
    { name:"Catherine of Siena", nameUr:"کیتھرین سیانا", tag:"1347–1380", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1347, the twenty-fourth of twenty-five children in a Sienese wool-dyer's family, Catherine experienced visions from a young age and resisted her parents' plans to marry her off, cutting off her hair in protest and dedicating herself to prayer and service to the sick and poor.",
        ur:"کیتھرین 1347 میں سیانا کے ایک اونی رنگریز کے گھر پچیس بچوں میں سے چوبیسویں پیدا ہوئی۔ چھوٹی عمر سے رویائیں دیکھنے لگی اور شادی کی مخالفت میں اپنے بال کاٹ ڈالے۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Though entirely without formal schooling, Catherine became a bold and unlikely advisor to popes and cardinals during a period of crisis when the papacy had relocated to Avignon, France. She faced skepticism for a young, unlettered woman speaking so directly to powerful churchmen, yet persisted, eventually traveling to Avignon herself.",
        ur:"بغیر کسی رسمی تعلیم کے، کیتھرین پوپ اور کارڈینلز کی بے باک مشیر بن گئی، اس دور میں جب پاپائیت فرانس کے شہر ایوینون منتقل ہو چکی تھی۔ اسے شک کا سامنا کرنا پڑا، مگر وہ خود ایوینون گئی۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Catherine successfully persuaded Pope Gregory XI to return the papacy to Rome in 1377, reshaping the course of Church history. She died at only thirty-three, and centuries later was declared a Doctor of the Church for the theological depth of her writings, particularly The Dialogue, dictated during ecstatic prayer.",
        ur:"کیتھرین نے پوپ کو روم واپس آنے پر آمادہ کیا۔ وہ صرف تینتیس سال کی عمر میں وفات پا گئی، اور صدیوں بعد اسے کلیسیا کی معلمہ قرار دیا گیا۔" }
    ]},
    { name:"Teresa of Avila", nameUr:"تریسا آویلا", tag:"1515–1582", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1515 to a Spanish family, Teresa entered a Carmelite convent as a young woman partly to escape an unwanted marriage. For years she lived a comfortable, socially active convent life that left her spiritually unsatisfied and, by her own account, half-hearted in prayer.",
        ur:"تریسا 1515 میں ہسپانوی خاندان میں پیدا ہوئی اور جوانی میں ایک ناپسندیدہ شادی سے بچنے کے لیے کارملائٹ خانقاہ میں داخل ہوئی۔ برسوں تک وہ ایک آرام دہ زندگی گزارتی رہی جو روحانی طور پر غیر مطمئن تھی۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"In her forties, Teresa experienced a profound conversion of heart that pushed her toward a stricter, more contemplative life, but her efforts to reform the Carmelite order met fierce resistance from other nuns, local authorities, and eventually suspicion from the Spanish Inquisition, which investigated her writings and visions.",
        ur:"چالیس سال کی عمر میں گہری تبدیلی کے بعد، تریسا نے آرڈر کو سخت اور غریب بنانے کی کوشش کی، مگر دوسری راہباؤں اور ہسپانوی انکوزیشن کی سخت مخالفت کا سامنا کرنا پڑا، جس نے اس کی تحریروں کی تحقیقات کیں۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Despite this opposition, Teresa founded seventeen new reformed convents across Spain. Her book Interior Castle describes the soul's journey through seven ‘mansions’ toward union with God and remains one of the great classics of Christian mysticism, and she was later declared a Doctor of the Church.",
        ur:"اس مخالفت کے باوجود، تریسا نے ہسپانیہ بھر میں سترہ نئی اصلاح شدہ خانقاہیں قائم کیں۔ اس کی کتاب ‘اندرونی قلعہ’ روح کے خدا سے اتحاد کے سفر کو بیان کرتی ہے۔" }
    ]},
    { name:"John of the Cross", nameUr:"جان آف دی کراس", tag:"1542–1591", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1542 to a poor family in Spain, John studied at a Jesuit school before joining the Carmelite order. He met Teresa of Avila as a young priest and became a close collaborator in her project to reform the order toward greater simplicity and contemplative depth.",
        ur:"جان 1542 میں ہسپانیہ کے ایک غریب گھرانے میں پیدا ہوا۔ جیسوٹ سکول میں تعلیم کے بعد کارملائٹ آرڈر میں شامل ہوا اور تریسا آف آویلا کی اصلاحی تحریک میں قریبی ساتھی بن گیا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Opponents of the reform had John kidnapped by fellow Carmelites and imprisoned in a tiny, dark cell in Toledo for nine months, where he was regularly brought out for public punishment. He eventually escaped by tying together strips of cloth to climb through a small window.",
        ur:"اصلاح کے مخالف راہبوں نے جان کو اغوا کر کے تولیدو کے ایک تاریک، چھوٹے سیل میں نو ماہ تک قید رکھا۔ آخرکار اس نے کپڑوں کی پٹیاں باندھ کر ایک چھوٹی کھڑکی سے فرار پایا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Out of this imprisonment came some of his greatest poetry, including Dark Night of the Soul, which describes how periods when God feels distant can actually be a purifying stage that draws the soul closer to him. His writings remain foundational texts of Christian mystical theology.",
        ur:"اسی قید کے دوران اس نے اپنی بہترین شاعری لکھی، بشمول ‘روح کی تاریک رات’، جو بیان کرتی ہے کہ خدا کی دوری کا احساس دراصل روح کو پاک کر کے اس کے قریب لا سکتا ہے۔" }
    ]},
    { name:"Ignatius of Loyola", nameUr:"اگناتیئس لویولا", tag:"1491–1556", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1491 to a noble Basque family, Ignatius pursued a career as a courtier and soldier, driven by vanity and ambition for glory. In 1521, a cannonball shattered his leg during the defense of Pamplona, ending his military career and forcing a long, painful recovery.",
        ur:"اگناتیئس 1491 میں باسک اشرافیہ کے گھرانے میں پیدا ہوا اور شہرت کی خواہش میں درباری اور سپاہی کی زندگی اپنائی۔ 1521 میں توپ کے گولے سے اس کی ٹانگ زخمی ہوئی، جس نے اس کے فوجی کیریئر کا خاتمہ کر دیا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"With nothing else to read during his convalescence, Ignatius was given books on the life of Christ and the saints, which sparked a slow but decisive change of heart. He later spent almost a year in intense prayer and self-examination in a cave near Manresa, working through severe spiritual turmoil before arriving at clarity.",
        ur:"صحت یابی کے دوران پڑھنے کو صرف مسیح اور اولیاء کی زندگیوں کی کتابیں ملیں، جس نے آہستہ آہستہ اس کا دل بدل دیا۔ اس نے مانریسا کے قریب ایک غار میں تقریباً ایک سال شدید دعا اور خود احتسابی میں گزارا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Out of this period came the Spiritual Exercises, a structured, practical method for discerning God's will still used worldwide today. Ignatius founded the Society of Jesus (the Jesuits) in 1540, which became a major force in education, theology, and missionary work across the globe.",
        ur:"اسی دور سے ‘روحانی مشقیں’ وجود میں آئیں، جو آج بھی خدا کی مرضی جاننے کا طریقہ سکھاتی ہیں۔ اگناتیئس نے 1540 میں سوسائٹی آف جیزس (جیسوٹس) قائم کی۔" }
    ]},
    { name:"Francis Xavier", nameUr:"فرانسس زیویئر", tag:"1506–1552", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1506 to Basque nobility, Francis Xavier studied in Paris, where he became close friends with Ignatius of Loyola and was among the first small group to found the Society of Jesus, initially more drawn to academic ambition than missionary life.",
        ur:"فرانسس زیویئر 1506 میں باسک اشرافیہ میں پیدا ہوا اور پیرس میں تعلیم کے دوران اگناتیئس لویولا کا قریبی دوست بنا، اور سوسائٹی آف جیزس بنانے والے ابتدائی گروہ میں شامل تھا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Sent as a missionary to India and later Japan, Xavier endured grueling sea voyages, unfamiliar and often hostile cultures, severe language barriers, tropical illness, and constant risk of shipwreck. He adapted his methods repeatedly to communicate Christian teaching within very different cultural contexts.",
        ur:"بھارت اور بعد میں جاپان بھیجے جانے پر زیویئر نے تھکا دینے والے سمندری سفر، اجنبی ثقافتیں، سخت زبان کی رکاوٹیں، بیماری، اور جہاز ٹوٹنے کا مسلسل خطرہ برداشت کیا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Xavier is credited with baptizing tens of thousands of people across South and East Asia in roughly a decade of ceaseless travel. He died in 1552 on a small island off the coast of China, still trying to find a way to reach the mainland.",
        ur:"زیویئر کو تقریباً ایک دہائی کے مسلسل سفر میں جنوبی اور مشرقی ایشیا میں ہزاروں لوگوں کو بپتسمہ دینے کا سہرا جاتا ہے۔ وہ 1552 میں چین کے ساحل کے قریب ایک چھوٹے جزیرے پر وفات پا گیا۔" }
    ]},
    { name:"Vincent de Paul", nameUr:"ونسنٹ ڈی پال", tag:"1581–1660", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1581 to a poor farming family in southwestern France, Vincent was ordained a priest partly as a path out of poverty. While traveling by sea early in his career, he was captured by pirates and sold into slavery in North Africa, escaping after roughly two years.",
        ur:"ونسنٹ 1581 میں فرانس کے ایک غریب کسان گھرانے میں پیدا ہوا اور غربت سے نکلنے کے لیے پادری بنا۔ ابتدائی کیریئر میں قزاقوں نے اسے پکڑ کر شمالی افریقہ میں غلام بنا دیا، جہاں سے وہ تقریباً دو سال بعد فرار ہوا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Returning to France, Vincent initially pursued a comfortable clerical career before a series of encounters with the desperate rural poor and condemned galley slaves reoriented his priorities entirely. He faced the difficulty of persuading wealthy patrons and clergy to take practical, sustained responsibility for the poor.",
        ur:"فرانس واپسی پر ونسنٹ نے پہلے آرام دہ کیریئر اپنایا، مگر دیہی غریبوں سے ملاقاتوں نے اس کی ترجیحات مکمل بدل دیں۔ اسے امیر سرپرستوں کو مستقل ذمہ داری پر آمادہ کرنا مشکل لگا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Vincent organized structured, ongoing relief efforts and founded religious communities, including the Daughters of Charity, devoted to serving the sick and destitute directly in their homes. His practical model of organized charity influenced how the Church approached poverty for centuries afterward.",
        ur:"ونسنٹ نے منظم امدادی کام قائم کیا اور ‘ڈاٹرز آف چیریٹی’ جیسی جماعتیں بنائیں جو بیماروں اور نادار لوگوں کی براہ راست خدمت کرتی تھیں۔" }
    ]},
    { name:"Seraphim of Sarov", nameUr:"سیرافم ساروفی", tag:"1754–1833", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1754 in Russia, Seraphim entered monastic life as a young man and eventually withdrew to live as a hermit in the forest near the Sarov monastery, spending years in near-total solitude, prayer, and extreme physical austerity, including reportedly standing on a rock in prayer for a thousand nights.",
        ur:"سیرافم 1754 میں روس میں پیدا ہوا اور جوانی میں راہبانہ زندگی اختیار کی، آخرکار ساروف خانقاہ کے قریب جنگل میں تنہا رہنے لگا، برسوں دعا اور سخت پرہیزی میں گزارے۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"While living alone in the forest, Seraphim was attacked and severely beaten by a group of robbers who wrongly believed he had hidden money, leaving him permanently bent over for the rest of his life. Remarkably, he asked that his attackers not be punished when they were later caught.",
        ur:"جنگل میں تنہا رہتے ہوئے، ڈاکوؤں کے ایک گروہ نے غلط فہمی میں اسے بری طرح مارا، جس سے وہ عمر بھر کے لیے جھکا رہ گیا۔ حیرت انگیز طور پر اس نے بعد میں ان کی سزا کے خلاف درخواست کی۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"In his final years, Seraphim opened his door to a constant stream of pilgrims, greeting each one with ‘My joy, Christ is risen,’ whatever the season. He taught that ‘the true aim of the Christian life is the acquisition of the Holy Spirit,’ and that one person's inner peace could help save thousands of others.",
        ur:"آخری برسوں میں سیرافم نے ہر زائر کو ‘میری خوشی، مسیح جی اٹھا ہے’ کہہ کر خوش آمدید کہا۔ اس نے سکھایا کہ مسیحی زندگی کا اصل مقصد روح القدس کا حصول ہے۔" }
    ]},
    { name:"Thérèse of Lisieux", nameUr:"تریز لیزیو", tag:"1873–1897", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1873 in France, Thérèse lost her mother at age four and was raised by her father and older sisters, several of whom also entered religious life. Determined to enter the Carmelite convent alongside her sisters despite her young age, she famously appealed in person to Pope Leo XIII to be allowed to join at only fifteen.",
        ur:"تریز 1873 میں فرانس میں پیدا ہوئی اور چار سال کی عمر میں اپنی والدہ کو کھو دیا۔ اپنی بہنوں کے ساتھ خانقاہ میں شامل ہونے کے لیے بے چین، اس نے پوپ سے ذاتی طور پر درخواست کی کہ اسے پندرہ سال کی عمر میں داخلہ دیا جائے۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Life within the convent was often difficult, marked by friction with other nuns, physical illness, and a period of profound inner spiritual darkness and doubt near the end of her life, even as she continued outwardly to encourage others in faith. She died of tuberculosis at only twenty-four.",
        ur:"خانقاہ کی زندگی اکثر مشکل تھی، دوسری راہباؤں سے رگڑ، جسمانی بیماری، اور زندگی کے آخر میں گہری روحانی تاریکی کے باوجود وہ دوسروں کو ایمان میں حوصلہ دیتی رہی۔ وہ صرف چوبیس سال کی عمر میں تپ دق سے وفات پا گئی۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Her autobiography, Story of a Soul, published after her death, introduced her ‘Little Way’ — the belief that small, hidden acts of love done with great faith matter to God as much as dramatic accomplishments. This simple spirituality made her one of the most beloved saints of the modern era.",
        ur:"اس کی خودنوشت ‘روح کی کہانی’ نے ‘چھوٹا راستہ’ متعارف کرایا — یہ یقین کہ محبت کے چھوٹے، پوشیدہ کام بڑے کارناموں جتنی اہمیت رکھتے ہیں۔" }
    ]},
    { name:"John Vianney", nameUr:"جان ویانی", tag:"1786–1859", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",
        en:"Born in 1786 in rural France during the upheaval of the French Revolution, Jean-Baptiste Vianney received a very limited early education. He struggled so severely with Latin and academic study in seminary that he was nearly dismissed from training for the priesthood entirely.",
        ur:"ژاں باپتیست ویانی 1786 میں فرانسیسی انقلاب کی افراتفری میں دیہی فرانس میں پیدا ہوا اور محدود ابتدائی تعلیم پائی۔ سیمینری میں لاطینی زبان کی شدید مشکل کی وجہ سے وہ تقریباً پادری بننے سے خارج کر دیا گیا۔" },
      { tEn:"Struggles & Trials", tUr:"آزمائشیں اور مصیبتیں",
        en:"Assigned to the small, spiritually neglected village of Ars, Vianney devoted himself to prayer, fasting, and hearing confessions for up to sixteen hours a day as pilgrims began arriving from across France. He also described years of strange nighttime disturbances he attributed to the devil trying to distract him.",
        ur:"آرس کے چھوٹے، نظر انداز گاؤں میں تعینات ہو کر، ویانی نے دعا، روزہ اور اعتراف سننے میں دن میں سولہ گھنٹے تک وقف کیے۔ اس نے رات کی عجیب پریشانیوں کا بھی ذکر کیا جنہیں وہ شیطان کی مداخلت سمجھتا تھا۔" },
      { tEn:"Teachings & Legacy", tUr:"تعلیمات اور میراث",
        en:"Vianney's relentless availability for confession, sometimes hearing thousands of people a year, became legendary, and he remains the patron saint of parish priests. His life demonstrated that a simple, poorly educated priest devoted entirely to prayer could transform an entire region's spiritual life.",
        ur:"ویانی کی اعتراف سننے کے لیے لگاتار دستیابی مشہور ہو گئی، بعض اوقات سالانہ ہزاروں لوگ آتے۔ وہ پیرش پادریوں کا سرپرست ولی ہے۔" }
    ]},
    { name:"Maximilian Kolbe", nameUr:"میکسیملین کولبے", tag:"1894–1941", sections:[
      { tEn:"Early Life & Calling", tUr:"ابتدائی زندگی اور بلاوا",

  function shuffledIndices(n){ var a=[]; for(var i=0;i<n;i++)a.push(i);
    for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function shuffle(arr){ return shuffledIndices(arr.length).map(function(i){ return arr[i]; }); }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  /* ---------------- Bible source: EN via bible-api.com, UR via wldeh CDN ---------------- */
  function fetchBibleRefEN(ref){
    var url = 'https://bible-api.com/' + encodeURIComponent(ref).replace(/%20/g,'+') + '?translation=web';
    return fetch(url).then(function(r){ if(!r.ok) throw new Error('bad response'); return r.json(); });
  }
  function normalizeUrVerses(json){
    if(json && Array.isArray(json.verses)) return json.verses.map(function(v){ return { verse: v.verse || v.verseNumber || v.number, text: v.text || v.verseText || '' }; });
    if(json && json.data && Array.isArray(json.data.verses)) return json.data.verses.map(function(v){ return { verse: v.verse || v.verseNumber, text: v.text || '' }; });
    if(Array.isArray(json)) return json.map(function(v,i){ return { verse: v.verse || v.verseNumber || (i+1), text: v.text || '' }; });
    if(json && typeof json === 'object' && json.text){ return [{ verse: json.verse || 1, text: json.text }]; }
    return [];
  }
  function fetchBibleChapterUR(book, chapter){
    var slug = BOOK_SLUGS[book];
    var url = 'https://cdn.jsdelivr.net/gh/wldeh/bible-api/bibles/ur-Aran-urdgvu/books/' + slug + '/chapters/' + chapter + '.json';
    return fetch(url).then(function(r){ if(!r.ok) throw new Error('bad response'); return r.json(); }).then(normalizeUrVerses);
  }
  function getChapterVerses(book, chapter){
    if(state.lang === 'ur'){
      return fetchBibleChapterUR(book, chapter);
    }
    return fetchBibleRefEN(book + ' ' + chapter).then(function(data){ return data.verses || []; });
  }
  function parseRef(ref){
    var m = ref.match(/^(.*)\s(\d+):(\d+)(?:-(\d+))?$/);
    if(!m) return null;
    return { book: m[1], chapter: parseInt(m[2],10), vStart: parseInt(m[3],10), vEnd: m[4] ? parseInt(m[4],10) : parseInt(m[3],10) };
  }
  function getPassage(ref){
    if(state.lang === 'en'){
      return fetchBibleRefEN(ref).then(function(data){
        return { text: (data.text||'').trim().replace(/\s+/g,' '), reference: data.reference || ref };
      });
    }
    var p = parseRef(ref);
    if(!p) return Promise.reject(new Error('bad ref'));
    return fetchBibleChapterUR(p.book, p.chapter).then(function(verses){
      var chosen = verses.filter(function(v){ return v.verse >= p.vStart && v.verse <= p.vEnd; });
      if(!chosen.length) throw new Error('no verses in range');
      var text = chosen.map(function(v){ return v.text.trim(); }).join(' ');
      var bookUr = BOOK_NAMES_UR[p.book] || p.book;
      var refDisplay = bookUr + ' ' + p.chapter + ':' + p.vStart + (p.vEnd!==p.vStart ? ('-'+p.vEnd) : '');
      return { text: text, reference: refDisplay };
    });
  }

  Array.prototype.forEach.call(document.querySelectorAll('#langtoggle .langbtn'), function(btn){

  function vfSet(key, val){ try{ if(window.storage) window.storage.set(key, typeof val==='string'?val:JSON.stringify(val), false); }catch(e){} }
  function vfGet(key){
    try{
      if(!window.storage) return Promise.resolve(null);
      return window.storage.get(key, false).then(function(r){ return r ? r.value : null; }).catch(function(){ return null; });
    }catch(e){ return Promise.resolve(null); }
  }
  (function initTheme(){
    vfGet('vf-theme').then(function(saved){
      var th = saved || 'dark';
      document.body.setAttribute('data-theme', th);

        b.classList.toggle('active', b.getAttribute('data-theme')===th);

  function setActiveTabUI(){

  function renderTab(){
    setActiveTabUI();
    if(state.tab === 'home') renderHome();
    else if(state.tab === 'quiz') renderQuizTab();
    else if(state.tab === 'bible') renderBibleReader();
    else if(state.tab === 'quran') renderQuranReader();
    else if(state.tab === 'ask') renderAsk();
    else if(state.tab === 'saints') renderSaints();

  /* ---------------- HOME ---------------- */
  function dayHash(){
    var d = new Date();
    var s = d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
    var h = 0;
    for(var i=0;i<s.length;i++){ h = ((h<<5) - h + s.charCodeAt(i)) | 0; }
    return Math.abs(h);
  }
  function loadVerseOfDay(cb){
    var h = dayHash();
    var book = BOOK_NAMES[h % BOOK_NAMES.length];
    var chapter = (Math.floor(h/7) % BOOKS[book]) + 1;
    getChapterVerses(book, chapter).then(function(verses){
      if(!verses.length) throw new Error('empty');
      var v = verses[h % verses.length];
      var bookLabel = state.lang==='ur' ? (BOOK_NAMES_UR[book]||book) : book;
      state.votd = { book: bookLabel, chapter: v.chapter || chapter, verse: v.verse, text: v.text.trim().replace(/\s+/g,' ') };
      cb();
    }).catch(function(){ state.votd = null; cb(); });
  }

  function starsHtml(){
    var s = '';
    for(var i=0;i<26;i++){
      var top = Math.random()*100, left = Math.random()*100, delay = (Math.random()*3.5).toFixed(2), size = (Math.random()<0.2)?3:2;
      s += '<span class="star" style="top:'+top+'%;left:'+left+'%;animation-delay:'+delay+'s;width:'+size+'px;height:'+size+'px;"></span>';
    }
    return s;
  }
  function renderHome(){
    clearTimer();
    var t = T();
    el('page').innerHTML =
      '<div class="holywrap"><div class="stars">' + starsHtml() + '</div>' +
        '<div class="holy-symbol">✟ ☾ ✦</div>' +
        '<div class="votd" id="votdBox" style="background:transparent;border:none;margin-bottom:0;position:relative;z-index:1;"><div class="eyebrow">' + t.votdLabel + '</div>' +
        (state.votd ?
          '<p class="vtext">"' + escapeHtml(state.votd.text) + '"</p><div class="vref">' + escapeHtml(state.votd.book) + ' ' + state.votd.chapter + ':' + state.votd.verse + '</div>' :
          '<div class="loading" style="padding:10px 0;"><span class="flame">🕯</span> ' + t.votdLoading + '</div>') +
        '</div>' +
        '<div class="holy-divider"><span>✦</span></div>' +
      '</div>' +
      '<p class="lead">' + t.homeLead + '</p>' +
      '<div class="cardgrid">' +
        '<button type="button" class="mode-card" id="goQuiz"><div class="glyph">?</div><div class="txt"><h3>' + t.cardQuizTitle + '</h3><p>' + t.cardQuizDesc + '</p></div></button>' +
        '<button type="button" class="mode-card" id="goBible"><div class="glyph">✟</div><div class="txt"><h3>' + t.cardBibleTitle + '</h3><p>' + t.cardBibleDesc + '</p></div></button>' +
        '<button type="button" class="mode-card" id="goQuran"><div class="glyph">☾</div><div class="txt"><h3>' + t.cardQuranTitle + '</h3><p>' + t.cardQuranDesc + '</p></div></button>' +
        '<button type="button" class="mode-card" id="goAsk"><div class="glyph">✎</div><div class="txt"><h3>' + t.cardAskTitle + '</h3><p>' + t.cardAskDesc + '</p></div></button>' +
        '<button type="button" class="mode-card" id="goSaints"><div class="glyph">🕊</div><div class="txt"><h3>' + t.navSaints + '</h3><p>' + t.saintsIntro + '</p></div></button>' +
      '</div>';
    if(!state.votd){ loadVerseOfDay(function(){ if(state.tab==='home') renderHome(); }); }
    el('goQuiz').addEventListener('click', function(){ state.tab='quiz'; setActiveTabUI(); renderTab(); });
    el('goBible').addEventListener('click', function(){ state.tab='bible'; setActiveTabUI(); renderTab(); });
    el('goQuran').addEventListener('click', function(){ state.tab='quran'; setActiveTabUI(); renderTab(); });
    el('goAsk').addEventListener('click', function(){ state.tab='ask'; setActiveTabUI(); renderTab(); });
    el('goSaints').addEventListener('click', function(){ state.tab='saints'; setActiveTabUI(); renderTab(); });
  }

  /* ---------------- QUIZ ---------------- */
  function renderQuizTab(){
    var t = T();
    if(!state.quizStarted){
      el('page').innerHTML =
        '<p class="lead">' + t.quizIntro + '</p>' +
        '<button class="btn-primary" id="startBtn">' + t.quizBtn + '</button>';
      el('startBtn').addEventListener('click', function(){
        state.score=0; state.total=0; state.streak=0; state.best=0; state.quizStarted=true;
        nextQuestion();
      });
      return;
    }
    nextQuestion();
  }

  function renderLoadingInPage(){
    el('page').innerHTML = '<div class="loading"><span class="flame">🕯</span> ' + T().loadingText + '</div>';
  }

  function fetchRandomVerse(){
    var book = pick(BOOK_NAMES);
    var chapter = 1 + Math.floor(Math.random()*BOOKS[book]);
    return getChapterVerses(book, chapter).then(function(verses){
      if(!verses.length) throw new Error('no verses');
      var candidates = verses.filter(function(v){ return v.text && v.text.trim().split(/\s+/).length >= 5; });
      if(!candidates.length) candidates = verses;
      var v = pick(candidates);
      var bookLabel = state.lang==='ur' ? (BOOK_NAMES_UR[book]||book) : book;
      return { book: bookLabel, bookKey: book, chapter: v.chapter || chapter, verse: v.verse, text: v.text.trim().replace(/\s+/g,' ') };
    });
  }

  function nextQuestion(){
    state.answered = false; clearTimer();
    var type = pick(['trivia','blank','reference']);
    if(type === 'trivia'){ renderTrivia(); return; }
    renderLoadingInPage();
    fetchRandomVerse().then(function(v){
      if(type === 'blank') renderBlank(v); else renderReference(v);
    }).catch(function(){ renderTrivia(); });
  }

  function startTimer(onExpire){
    state.timeLeft = TIME_LIMIT; paintTimer();
    state.timerId = setInterval(function(){
      state.timeLeft--; paintTimer();
      if(state.timeLeft <= 0){ clearTimer(); onExpire(); }
    }, 1000);
  }
  function paintTimer(){
    var bar = el('timerbar'), num = el('timernum');
    if(!bar) return;
    var pct = Math.max(0, (state.timeLeft / TIME_LIMIT) * 100);
    bar.style.width = pct + '%';
    bar.style.background = state.timeLeft <= 5 ? 'linear-gradient(90deg, var(--wrong), #8a2e2e)' : 'linear-gradient(90deg, var(--gold), #8a5a1c)';
    if(num) num.textContent = state.timeLeft + 's';
  }
  function timerHtml(){
    return '<div class="timerwrap"><div class="timerbar-bg"><div class="timerbar" id="timerbar" style="width:100%"></div></div>' +
      '<div class="timernum" id="timernum">' + TIME_LIMIT + 's</div></div>';
  }
  function statHtml(){
    var t = T();
    return '<div class="statbar"><div>' + t.scoreLabel + ' <b>' + state.score + '/' + state.total + '</b></div>' +
      '<div>' + t.streakLabel + ' <b>' + state.streak + '</b></div><div>' + t.bestLabel + ' <b>' + state.best + '</b></div></div>';
  }

  function renderTrivia(){
    var t = T();
    var TRIVIA = state.lang==='ur' ? TRIVIA_UR : TRIVIA_EN;
    if(state.triviaIdx >= state.triviaOrder.length || state.triviaOrder.length !== TRIVIA.length){ state.triviaOrder = shuffledIndices(TRIVIA.length); state.triviaIdx = 0; }
    var q = TRIVIA[state.triviaOrder[state.triviaIdx++]];
    var question=q[0], options=q[1], correctIdx=q[2];
    var order = shuffle(options.map(function(o,i){ return i; }));
    el('page').innerHTML = statHtml() +
      '<div class="qcard">' + timerHtml() + '<span class="qtag">' + t.trivia + '</span>' +
      '<div class="question-text">' + escapeHtml(question) + '</div>' +
      '<div class="options" id="opts"></div><div class="feedback" id="fb"></div></div>';
    var optsEl = el('opts');
    order.forEach(function(origIdx){
      var btn = document.createElement('button'); btn.className='opt'; btn.textContent = options[origIdx];
      btn.addEventListener('click', function(){
        handleAnswer(origIdx===correctIdx, btn, function(){ highlightCorrect(optsEl, options[correctIdx]); });
      });
      optsEl.appendChild(btn);
    });
    startTimer(function(){ handleAnswer(false, null, function(){ highlightCorrect(optsEl, options[correctIdx]); }, true); });
  }

  function renderBlank(v){
    var t = T();
    var words = v.text.split(' ');
    var candidates = words.map(function(w,i){ return {w:w,i:i}; }).filter(function(o){ return o.w.replace(/[^A-Za-z\u0600-\u06FF]/g,'').length>=3; });
    if(!candidates.length){ renderTrivia(); return; }
    var target = pick(candidates);
    var cleanWord = target.w.replace(/[^A-Za-z\u0600-\u06FF]/g,'');
    var displayWords = words.slice(); displayWords[target.i] = '_____';
    var blanked = displayWords.join(' ');
    var pool = (state.lang==='ur' ? WORD_POOL.ur : WORD_POOL.en).filter(function(w){ return w.toLowerCase()!==cleanWord.toLowerCase(); });
    var options = shuffle([cleanWord].concat(shuffle(pool).slice(0,3)));
    el('page').innerHTML = statHtml() +
      '<div class="qcard">' + timerHtml() +
      '<span class="qtag">' + t.fillBlank + ' &middot; ' + escapeHtml(v.book) + ' ' + v.chapter + ':' + v.verse + '</span>' +
      '<span class="drop">' + escapeHtml(blanked.charAt(0)) + '</span>' +
      '<p class="verse-text">' + escapeHtml(blanked.slice(1)) + '</p>' +
      '<div class="options" id="opts"></div><div class="feedback" id="fb"></div></div>';
    var optsEl = el('opts');
    options.forEach(function(opt){
      var btn = document.createElement('button'); btn.className='opt'; btn.textContent=opt;
      btn.addEventListener('click', function(){
        var isCorrect = opt.toLowerCase()===cleanWord.toLowerCase();
        handleAnswer(isCorrect, btn, function(){ highlightCorrect(optsEl, cleanWord, true); });
      });
      optsEl.appendChild(btn);
    });
    startTimer(function(){ handleAnswer(false, null, function(){ highlightCorrect(optsEl, cleanWord, true); }, true); });
  }

  function renderReference(v){
    var t = T();
    var namesPool = state.lang==='ur' ? BOOK_NAMES.map(function(b){ return BOOK_NAMES_UR[b]; }) : BOOK_NAMES.slice();
    var others = shuffle(namesPool.filter(function(b){ return b!==v.book; })).slice(0,3);
    var options = shuffle([v.book].concat(others));
    el('page').innerHTML = statHtml() +
      '<div class="qcard">' + timerHtml() + '<span class="qtag">' + t.nameBook + '</span>' +
      '<span class="drop">' + escapeHtml(v.text.charAt(0)) + '</span>' +
      '<p class="verse-text">' + escapeHtml(v.text.slice(1)) + '</p>' +
      '<div class="ref-tag" id="refReveal" style="visibility:hidden;">' + escapeHtml(v.book) + ' ' + v.chapter + ':' + v.verse + '</div>' +
      '<div class="options" id="opts"></div><div class="feedback" id="fb"></div></div>';
    var optsEl = el('opts');
    options.forEach(function(opt){
      var btn = document.createElement('button'); btn.className='opt'; btn.textContent=opt;
      btn.addEventListener('click', function(){
        var isCorrect = opt === v.book;
        el('refReveal').style.visibility = 'visible';
        handleAnswer(isCorrect, btn, function(){ highlightCorrect(optsEl, v.book); });
      });
      optsEl.appendChild(btn);
    });
    startTimer(function(){
      el('refReveal').style.visibility = 'visible';
      handleAnswer(false, null, function(){ highlightCorrect(optsEl, v.book); }, true);
    });
  }

  function highlightCorrect(optsEl, correctText, ci){
    Array.prototype.forEach.call(optsEl.children, function(b){
      var match = ci ? b.textContent.toLowerCase()===correctText.toLowerCase() : b.textContent===correctText;
      if(match) b.classList.add('correct');
    });
  }

  function handleAnswer(isCorrect, btn, revealFn, timedOut){
    if(state.answered) return;
    state.answered = true; clearTimer(); state.total++;
    var t = T();
    if(isCorrect){ state.score++; state.streak++; if(state.streak>state.best) state.best=state.streak; if(btn) btn.classList.add('correct'); }
    else { state.streak = 0; if(btn) btn.classList.add('wrong'); }
    revealFn();
    var sb = document.querySelector('.statbar');
    if(sb) sb.outerHTML = statHtml();
    Array.prototype.forEach.call(el('opts').children, function(b){ b.disabled = true; });
    var fb = el('fb');
    fb.classList.add('show', isCorrect ? 'good' : 'bad');
    fb.textContent = timedOut ? t.timesUp : (isCorrect ? t.correct : t.notQuite);
    var cont = document.createElement('button');
    cont.className = 'btn-primary'; cont.style.marginTop = '18px'; cont.textContent = t.nextBtn;
    cont.addEventListener('click', nextQuestion);
    document.querySelector('.qcard').appendChild(cont);
  }

  /* ---------------- BIBLE READER ---------------- */

      var label = state.lang==='ur' ? (BOOK_NAMES_UR[b]||b) : b;

    }).join('');

  function chapterOptionsHtml(count, sel){

  function hlPanelInnerHtml(showClose){

  var HL_RGB = { yellow:'255,224,89', green:'120,224,120', pink:'255,140,190', blue:'110,180,255', orange:'255,158,66',
    purple:'190,130,255', red:'255,99,99', teal:'80,220,200', gold:'224,180,60', gray:'190,190,200' };
  function wireSwatchesIn(container, onChange){
    container.style.setProperty('--pen-' + state.activeColor, HL_RGB[state.activeColor]);

  function refreshHlPanel(){
    var panel = el('hlPanel');
    if(!panel) return;
    panel.innerHTML = hlPanelInnerHtml(true);
    wireSwatchesIn(panel, refreshHlPanel);

  /* Verse-triggered highlighter modal ("Note") */

    var existing = state.highlights[key];
    if(existing){ state.activeColor = existing.color; state.neon = existing.neon; }
    closeVerseNoteModal();
    var t = T();
    var overlay = document.createElement('div');
    overlay.className = 'notemodal-overlay';
    overlay.id = 'noteModalOverlay';
    overlay.innerHTML =
      '<div class="notemodal" id="noteModal">' +
        '<div class="answer-q" style="color:var(--gold);margin-bottom:2px;">' + escapeHtml(refLabel) + '</div>' +
        '<div class="notemodal-preview">' + escapeHtml(preview) + '</div>' +
        '<div id="noteModalPanelInner"></div>' +
        '<div class="notemodal-actions">' +
          '<button type="button" class="btn-primary" id="applyHlBtn">' + (state.lang==='ur'?'ہائی لائٹ لگائیں':'Apply Highlight') + '</button>' +
          (existing ? '<button type="button" class="removebtn" id="removeHlBtn">' + (state.lang==='ur'?'ہائی لائٹ ہٹائیں':'Remove Highlight') + '</button>' : '') +
          '<button type="button" class="hlclose" id="cancelHlBtn">' + (state.lang==='ur'?'منسوخ':'Cancel') + '</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    var inner = el('noteModalPanelInner');
    function paintModalPanel(){ inner.innerHTML = hlPanelInnerHtml(false); wireSwatchesIn(inner, paintModalPanel); }
    paintModalPanel();

    overlay.addEventListener('click', function(e){ if(e.target === overlay) closeVerseNoteModal(); });
    el('cancelHlBtn').addEventListener('click', closeVerseNoteModal);

      state.highlights[key] = { color: state.activeColor, neon: state.neon };

      }).catch(function(){});
    }
  }
