      '<div id="lastReadBox"></div>';
    bindNoteTopbar();

    el('bookSel').addEventListener('change', function(e){ r.book = e.target.value; r.chapter = 1; renderBibleReader(); });
    el('chapSel').addEventListener('change', function(e){ r.chapter = parseInt(e.target.value,10); renderBibleReader(); });
    el('prevBtn').addEventListener('click', function(){
      var idx = BOOK_NAMES.indexOf(r.book);
      if(r.chapter>1){ r.chapter--; } else if(idx>0){ r.book = BOOK_NAMES[idx-1]; r.chapter = BOOKS[r.book]; }
      renderBibleReader();
    });
    el('nextBtn').addEventListener('click', function(){
      var idx = BOOK_NAMES.indexOf(r.book);
      if(r.chapter<BOOKS[r.book]){ r.chapter++; } else if(idx<BOOK_NAMES.length-1){ r.book = BOOK_NAMES[idx+1]; r.chapter = 1; }
      renderBibleReader();
    });
    var idx2 = BOOK_NAMES.indexOf(r.book);
    el('prevBtn').disabled = (r.chapter===1 && idx2===0);
    el('nextBtn').disabled = (r.chapter===BOOKS[r.book] && idx2===BOOK_NAMES.length-1);

    vfGet('vf-lastread-bible').then(function(raw){
      var saved = null; try{ saved = raw ? JSON.parse(raw) : null; }catch(e){}
      var box = el('lastReadBox');
      if(!box) return;
      box.innerHTML = lastReadStripHtml(saved, 'bible');
      var cbtn = el('continueReadBtn');
      if(cbtn && saved){ cbtn.addEventListener('click', function(){ r.book = saved.book; r.chapter = saved.chapter; renderBibleReader(); }); }
    });

    getChapterVerses(r.book, r.chapter).then(function(verses){
      paintBibleChapter(verses);
      vfSet('vf-lastread-bible', JSON.stringify({ book: r.book, chapter: r.chapter }));
    }).catch(function(){
      el('readerCard').innerHTML = '<div class="reader-card"><p>' + t.chapterErr + '</p>' +
        '<div class="navrow"><button type="button" class="navbtn" id="retryBtn">↻ ' + (state.lang==='ur'?'دوبارہ کوشش کریں':'Try again') + '</button>' +
        (state.lang==='ur' ? '<button type="button" class="navbtn" id="switchEnBtn">English میں دیکھیں</button>' : '') + '</div></div>';
      var rb = el('retryBtn'); if(rb) rb.addEventListener('click', renderBibleReader);
      var sb = el('switchEnBtn'); if(sb) sb.addEventListener('click', function(){ state.lang='en'; applyLangChrome(); renderBibleReader(); });
    });
  }

  function paintBibleChapter(verses){
    var t = T();
    var r = state.reader;
    var titleLabel = state.lang==='ur' ? (BOOK_NAMES_UR[r.book]||r.book) : r.book;
    var html = '<div class="reader-card"><h2 class="reader-title">' + escapeHtml(titleLabel) + ' ' + r.chapter + '</h2>';
    verses.forEach(function(v){
      var key = 'bible|' + r.book + '|' + r.chapter + '|' + v.verse;
      var hlData = state.highlights[key];
      var hlClass = hlData ? (' highlighted hl-' + hlData.color + (hlData.neon ? ' neon' : '')) : '';
      var refLabel = titleLabel + ' ' + r.chapter + ':' + v.verse;
      var shareIcon = hlData ? '<span class="shareicon" data-share-key="'+key+'" data-ref="'+escapeHtml(refLabel)+'" title="' + t.shareBtn + '">↗</span>' : '';
      html += '<p class="reader-verse'+hlClass+'" data-key="'+key+'" data-ref="'+escapeHtml(refLabel)+'" data-text="'+escapeHtml(v.text.trim())+'" tabindex="0"><span class="vnum">' + v.verse + '</span>' + escapeHtml(v.text.trim()) + shareIcon + '</p>';
    });
    html += '</div>';
    el('readerCard').innerHTML = html;
    attachHighlightHandlers(function(){ paintBibleChapter(verses); });
  }

  /* ---------------- QURAN READER ---------------- */
  function surahOptionsHtml(sel){ return SURAHS.map(function(name,i){ var n=i+1; return '<option value="'+n+'"'+(n===sel?' selected':'')+'>'+n+'. '+escapeHtml(name)+'</option>'; }).join(''); }

  function renderQuranReader(){
    clearTimer();
    state.hlPanelOpen = false;
    var t = T();
    var r = state.quran;
    el('page').innerHTML =
      noteTopbarHtml() +
      '<div class="reader-controls"><select id="surahSel">' + surahOptionsHtml(r.surah) + '</select></div>' +
      '<div class="navrow">' +
        '<button type="button" class="navbtn" id="prevBtn">' + t.prevSurah + '</button>' +
        '<button type="button" class="navbtn" id="nextBtn">' + t.nextSurah + '</button>' +
      '</div>' +
      '<p class="reader-hint">' + t.readerHintQuran + '</p>' +
      '<div id="readerCard"><div class="loading"><span class="flame">🕯</span> ' + t.loadingText + '</div></div>' +
      '<div id="lastReadBox"></div>';
    bindNoteTopbar();

    el('surahSel').addEventListener('change', function(e){ r.surah = parseInt(e.target.value,10); renderQuranReader(); });
    el('prevBtn').addEventListener('click', function(){ if(r.surah>1){ r.surah--; renderQuranReader(); } });
    el('nextBtn').addEventListener('click', function(){ if(r.surah<114){ r.surah++; renderQuranReader(); } });
    el('prevBtn').disabled = (r.surah<=1);
    el('nextBtn').disabled = (r.surah>=114);

    vfGet('vf-lastread-quran').then(function(raw){
      var saved = null; try{ saved = raw ? JSON.parse(raw) : null; }catch(e){}
      var box = el('lastReadBox');
      if(!box) return;
      box.innerHTML = lastReadStripHtml(saved, 'quran');
      var cbtn = el('continueReadBtn');
      if(cbtn && saved){ cbtn.addEventListener('click', function(){ r.surah = saved.surah; renderQuranReader(); }); }
    });

    var edition = state.lang==='ur' ? 'ur.jalandhry' : 'en.pickthall';
    fetch('https://api.alquran.cloud/v1/surah/' + r.surah + '/' + edition)
      .then(function(res){ if(!res.ok) throw new Error('bad'); return res.json(); })
      .then(function(json){
        paintQuranSurah(json.data);
        vfSet('vf-lastread-quran', JSON.stringify({ surah: r.surah }));
      }).catch(function(){
        el('readerCard').innerHTML = '<div class="reader-card"><p>' + t.surahErr + '</p>' +
          '<div class="navrow"><button type="button" class="navbtn" id="retryBtn">↻ ' + (state.lang==='ur'?'دوبارہ کوشش کریں':'Try again') + '</button></div></div>';
        var rb = el('retryBtn'); if(rb) rb.addEventListener('click', renderQuranReader);
      });
  }

  function paintQuranSurah(d){
    var t = T();
    var r = state.quran;
    var subtitle = d.englishNameTranslation ? ' <span style="font-family:\'JetBrains Mono\',monospace;font-size:0.68rem;color:#8a7238;">(' + escapeHtml(d.englishNameTranslation) + ')</span>' : '';
    var html = '<div class="reader-card"><h2 class="reader-title">' + d.number + '. ' + escapeHtml(d.englishName) + subtitle + '</h2>';
    (d.ayahs||[]).forEach(function(a){
      var key = 'quran|' + r.surah + '|' + a.numberInSurah;
      var hlData = state.highlights[key];
      var hlClass = hlData ? (' highlighted hl-' + hlData.color + (hlData.neon ? ' neon' : '')) : '';
      var refLabel = d.englishName + ' ' + a.numberInSurah;
      var shareIcon = hlData ? '<span class="shareicon" data-share-key="'+key+'" data-ref="'+escapeHtml(refLabel)+'" title="' + t.shareBtn + '">↗</span>' : '';
      html += '<p class="reader-verse'+hlClass+'" data-key="'+key+'" data-ref="'+escapeHtml(refLabel)+'" data-text="'+escapeHtml(a.text.trim())+'" tabindex="0"><span class="vnum">' + a.numberInSurah + '</span>' + escapeHtml(a.text.trim()) + shareIcon + '</p>';
    });
    html += '</div>';
    el('readerCard').innerHTML = html;
    attachHighlightHandlers(function(){ paintQuranSurah(d); });
  }

  function attachHighlightHandlers(repaint){
    Array.prototype.forEach.call(document.querySelectorAll('.reader-verse'), function(p){
      p.addEventListener('click', function(e){
        if(e.target && e.target.classList && e.target.classList.contains('shareicon')){
          e.stopPropagation();
          shareVerse(p.getAttribute('data-text'), e.target.getAttribute('data-ref'), e.target);
          return;
        }
        var key = p.getAttribute('data-key');
        var refLabel = p.getAttribute('data-ref');
        var preview = p.getAttribute('data-text');
        openVerseNoteModal(key, refLabel, preview, function(wasApplied){
          if(repaint) repaint();
          if(wasApplied){
            var fresh = document.querySelector('.reader-verse[data-key="' + key.replace(/"/g,'') + '"]');
            if(fresh){ fresh.classList.add('sweep'); setTimeout(function(){ fresh.classList.remove('sweep'); }, 500); }
          }
        });
      });
      p.addEventListener('keypress', function(e){ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); p.click(); } });
    });
  }

  /* ---------------- ASK ---------------- */
  function matchTopic(question){
    var q = question.toLowerCase();
    var best = null, bestScore = 0;
    TOPICS.forEach(function(top){
      var score = 0;
      top.kw.forEach(function(k){ if(q.indexOf(k.toLowerCase()) !== -1) score++; });
      if(score > bestScore){ bestScore = score; best = top; }
    });
    return best;
  }

  function renderAsk(){
    clearTimer();
    var t = T();
    el('page').innerHTML =
      '<p class="lead">' + t.askLead + '</p>' +
      '<div class="askbox"><input type="text" id="askInput" placeholder="' + escapeHtml(t.askPlaceholder) + '">' +
        '<button id="askBtn">' + t.askBtn + '</button></div>' +
      '<div class="chips" id="chips"></div>' +
      '<div id="askResult"></div>';
    var chipsEl = el('chips');
    CHIPS.forEach(function(c){
      var b = document.createElement('button');
      b.className = 'chip'; b.textContent = state.lang==='ur' ? c.ur : c.en;
      b.addEventListener('click', function(){ el('askInput').value = state.lang==='ur' ? c.fillUr : c.fillEn; submitAsk(); });
      chipsEl.appendChild(b);
    });
    el('askBtn').addEventListener('click', submitAsk);
    el('askInput').addEventListener('keypress', function(e){ if(e.key==='Enter') submitAsk(); });
  }

  function submitAsk(){
    var t = T();
    var q = el('askInput').value.trim();
    if(!q) return;
    var topic = matchTopic(q);
    var usedFallback = !topic;
    var refs = topic ? topic.refs : FALLBACK_REFS;
    var ref = pick(refs);
    el('askResult').innerHTML = '<div class="loading"><span class="flame">🕯</span> ' + t.loadingText + '</div>';
    getPassage(ref).then(function(res){
      var altRefs = refs.filter(function(r){ return r !== ref; });
      el('askResult').innerHTML =
        '<div class="answer-card">' +
          '<div class="answer-q">' + (usedFallback ? t.fallback : t.answering + ' "' + escapeHtml(q) + '"') + '</div>' +
          '<p class="answer-text">"' + escapeHtml(res.text) + '"</p>' +
          '<div class="answer-ref">' + escapeHtml(res.reference) + '</div>' +
          (altRefs.length ? '<div class="answer-alt">' + t.seeAlso + ' ' + altRefs.map(escapeHtml).join(' · ') + '</div>' : '') +
        '</div>';
    }).catch(function(){
      el('askResult').innerHTML = '<div class="answer-card"><p>' + t.askErr + '</p></div>';
    });
  }

  /* ---------------- SAINTS / HISTORY ---------------- */
  function renderSaints(){
    clearTimer();
    var t = T();
    var html = '<p class="lead">' + t.saintsIntro + '</p><div id="saintsList">';
    SAINTS.forEach(function(s, i){
      var label = state.lang==='ur' ? (s.nameUr || s.name) : s.name;
      html += '<button type="button" class="saint-card" data-idx="' + i + '">' +
        '<span class="sname">' + escapeHtml(label) + '</span>' +
        '<span style="display:flex;align-items:center;gap:10px;"><span class="stag">' + escapeHtml(s.tag) + '</span><span class="sarrow">' + (state.lang==='ur'?'←':'→') + '</span></span>' +
      '</button>';
    });
    html += '</div>';
    el('page').innerHTML = html;
    Array.prototype.forEach.call(document.querySelectorAll('.saint-card'), function(btn){
      btn.addEventListener('click', function(){
        renderSaintDetail(parseInt(btn.getAttribute('data-idx'), 10), 0);
      });
    });
  }

  function renderSaintDetail(idx, page){
    clearTimer();
    var t = T();
    var s = SAINTS[idx];
    var sec = s.sections[page];
    var name = state.lang==='ur' ? (s.nameUr || s.name) : s.name;
    var secTitle = state.lang==='ur' ? sec.tUr : sec.tEn;
    var secText = state.lang==='ur' ? sec.ur : sec.en;

    var dots = s.sections.map(function(_, i){
      return '<button type="button" class="saint-dot' + (i===page?' active':'') + '" data-page="' + i + '" aria-label="page ' + (i+1) + '"></button>';
    }).join('');

    el('page').innerHTML =
      '<button type="button" class="btn-ghost" id="backToSaints">' + (state.lang==='ur' ? '→ فہرست پر واپس' : '← Back to list') + '</button>' +
      '<div class="saint-detail-head" style="margin-top:14px;"><h2>' + escapeHtml(name) + '</h2><span class="stag">' + escapeHtml(s.tag) + '</span></div>' +
      '<div class="saint-dots">' + dots + '</div>' +
      '<div class="saint-page"><h3>' + (page+1) + ' / ' + s.sections.length + ' — ' + escapeHtml(secTitle) + '</h3><p>' + secText + '</p></div>' +
      '<div class="saint-pagernav">' +
        '<button type="button" class="navbtn" id="saintPrev"' + (page===0?' disabled':'') + '>' + (state.lang==='ur'?'→ پچھلا':'← Previous') + '</button>' +
        '<button type="button" class="navbtn" id="saintNext"' + (page===s.sections.length-1?' disabled':'') + '>' + (state.lang==='ur'?'اگلا ←':'Next →') + '</button>' +
      '</div>';

    el('backToSaints').addEventListener('click', renderSaints);
    Array.prototype.forEach.call(document.querySelectorAll('.saint-dot'), function(d){
      d.addEventListener('click', function(){ renderSaintDetail(idx, parseInt(d.getAttribute('data-page'),10)); });
    });
    var prevBtn = el('saintPrev'), nextBtn = el('saintNext');
    if(prevBtn) prevBtn.addEventListener('click', function(){ if(page>0) renderSaintDetail(idx, page-1); });
    if(nextBtn) nextBtn.addEventListener('click', function(){ if(page<s.sections.length-1) renderSaintDetail(idx, page+1); });
  }

  applyLangChrome();
  vfGet('vf-highlights').then(function(raw){
    try{ if(raw) state.highlights = JSON.parse(raw); }catch(e){}
    renderTab();
  });
})();
</script>
</body>
</html>
